[functions]
  directory = "apps/functions"
  included_files = ["apps/functions/.env"]
[build]
  base = "apps/gatsby"
  command = "pnpm run build"
[build.environment]
  NODE_VERSION = "24"
[dev]
  #framework = "gatsby"
  base = "apps/gatsby"
  command = "pnpm run develop:gatsby"
  functionsPort = 7000
